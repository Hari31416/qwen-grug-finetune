name: Deploy Visualizer

on:
  push:
    branches:
      - main
    paths:
      - 'visualize/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'visualize/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm --dir visualize install --no-frozen-lockfile

      - name: Build
        run: pnpm --dir visualize run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: visualize/dist
          branch: gh-pages
