target_model:
  name: qwen3.5-0.8b
  mlx_path: mlx-community/Qwen3.5-0.8B-OptiQ-4bit
  size: 0.8b

# Model fallback example:
# target_model:
#   name: qwen3.5-2b
#   mlx_path: mlx-community/Qwen3.5-2B-OptiQ-4bit
#   size: 2b

run:
  seed: 42
  temperature: 0.6
  top_p: 0.95
  max_generation_tokens: 1024
  eval_max_generation_tokens: 1024

dataset:
  train_split_ratio: 0.9  # 900 train / 100 valid (total 1,000)
  sample_sizes:
    strategyqa: 170
    logiqa: 150
    boolq: 130
    anli: 200
    piqa: 150
    reclor: 200

paths:
  # Base directories
  data_dir: "data"
  sft_dir: "data/sft"
  sft_prompts: "data/sft/prompts.jsonl"
  train_data: "data/train.jsonl"
  valid_data: "data/valid.jsonl"
  
  # Templates (resolved in config.py by replacing {name})
  adapters: "adapters/{name}/"
  results: "results/{name}/"
  raw_traces: "data/raw/{name}/"
  compressed_traces: "data/compressed/{name}/"
