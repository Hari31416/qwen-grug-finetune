target_model:
  name: deepseek-r1-1.5b
  mlx_path: mlx-community/DeepSeek-R1-Distill-Qwen-1.5B-4bit
  hf_path: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
  size: 1.5b
  quantized: true

run:
  seed: 42
  temperature: 0.6
  top_p: 0.95
  max_generation_tokens: 1536
  eval_max_generation_tokens: 1536

dataset:
  train_split_ratio: 0.9  # 900 train / 100 valid (total 1,000)
  sample_sizes:
    strategyqa: 170
    logiqa: 150
    boolq: 130
    anli: 200
    piqa: 150
    reclor: 200

paths:
  # Base directories
  data_dir: "data"
  sft_dir: "data/sft"
  sft_prompts: "data/sft/prompts.jsonl"
  train_data: "data/train.jsonl"
  valid_data: "data/valid.jsonl"
  
  # Templates (resolved in config.py by replacing {name})
  adapters: "adapters/{name}/"
  results: "results/{name}/"
  raw_traces: "data/raw/{name}/"
  compressed_traces: "data/compressed/{name}/"
  validated_traces: "data/validated/{name}/"
