# LoRA training configuration for mlx_lm.lora
# Note: model, data, and adapter_path will be set dynamically by train.py based on config.yaml.

lora_parameters:
  rank: 8
  alpha: 16
  dropout: 0.05
  keys: 
    - "self_attn.q_proj"
    - "self_attn.v_proj"
    - "self_attn.k_proj"
    - "self_attn.o_proj"

# Training hyperparameters
batch_size: 2
iters: 800
learning_rate: 1e-5
steps_per_report: 10
steps_per_eval: 50
val_batches: 25
save_every: 100
